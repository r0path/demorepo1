name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: some-org/deploy-action@main

      - uses: another-org/notify-action@v2

      - name: Deploy to production
        run: |
          echo "Deploying ${{ github.ref_name }}"
          ./deploy.sh
