name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        run: |
          echo "Creating release for ${{ github.event.inputs.tag }}"

  notify:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Send notification
        run: echo "Released ${{ github.event.release.body }}"
